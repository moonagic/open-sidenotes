name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Check if should release
        id: check
        run: |
          # Get last release tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "No previous tags found, will create initial release"
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if there are any feat/fix commits since last tag
          COMMITS=$(git log ${LAST_TAG}..HEAD --oneline --grep="^feat" --grep="^fix" -E)

          if [ -n "$COMMITS" ]; then
            echo "Found release-worthy commits since $LAST_TAG"
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "No feat/fix commits since $LAST_TAG"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine version bump
        if: steps.check.outputs.should_release == 'true'
        id: version
        run: |
          # Get current version
          CURRENT_VERSION=$(cat .release-please-manifest.json | jq -r '."."')

          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="HEAD"
          fi

          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

          # Check for breaking changes
          if git log ${LAST_TAG}..HEAD --grep="BREAKING CHANGE" --grep="^feat!" --grep="^fix!" -E | grep -q .; then
            BUMP="major"
          # Check for features
          elif git log ${LAST_TAG}..HEAD --grep="^feat" -E | grep -q .; then
            BUMP="minor"
          # Otherwise patch
          else
            BUMP="patch"
          fi

          echo "Current version: $CURRENT_VERSION"
          echo "Bump type: $BUMP"

          # Calculate new version
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"

          case $BUMP in
            major)
              NEW_VERSION="$((major + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${major}.$((minor + 1)).0"
              ;;
            patch)
              NEW_VERSION="${major}.${minor}.$((patch + 1))"
              ;;
          esac

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version will be: $NEW_VERSION"

      - name: Generate CHANGELOG
        if: steps.check.outputs.should_release == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          LAST_TAG: ${{ steps.version.outputs.last_tag }}
        run: |
          COMMITS_RANGE="${LAST_TAG}..HEAD"

          echo "===== DEBUG ====="
          echo "LAST_TAG: $LAST_TAG"
          echo "COMMITS_RANGE: $COMMITS_RANGE"
          echo "Commits in range:"
          git log $COMMITS_RANGE --oneline
          echo "Features:"
          git log $COMMITS_RANGE --grep="^feat" -E --pretty=format:"%s|%h|%H"
          echo ""
          echo "Fixes:"
          git log $COMMITS_RANGE --grep="^fix" -E --pretty=format:"%s|%h|%H"
          echo ""
          echo "================="

          # Start changelog entry
          CHANGELOG_ENTRY="## [$NEW_VERSION](https://github.com/mlhiter/open-sidenotes/releases/tag/v$NEW_VERSION) ($(date +%Y-%m-%d))\n\n"

          # Get features (remove 'feat:' or 'feat(scope):' prefix)
          FEATURES=""
          while IFS= read -r line; do
            msg=$(echo "$line" | cut -d'|' -f1)
            short=$(echo "$line" | cut -d'|' -f2)
            full=$(echo "$line" | cut -d'|' -f3)
            clean_msg=$(echo "$msg" | sed -E 's/^feat(\([^)]+\))?!?:[[:space:]]*//')
            FEATURES="${FEATURES}* ${clean_msg} ([${short}](https://github.com/mlhiter/open-sidenotes/commit/${full}))\n"
          done < <(git log $COMMITS_RANGE --grep="^feat" -E --pretty=format:"%s|%h|%H")

          if [ -n "$FEATURES" ]; then
            CHANGELOG_ENTRY="${CHANGELOG_ENTRY}### Features\n\n${FEATURES}\n"
          fi

          # Get fixes (remove 'fix:' or 'fix(scope):' prefix)
          FIXES=""
          while IFS= read -r line; do
            msg=$(echo "$line" | cut -d'|' -f1)
            short=$(echo "$line" | cut -d'|' -f2)
            full=$(echo "$line" | cut -d'|' -f3)
            clean_msg=$(echo "$msg" | sed -E 's/^fix(\([^)]+\))?!?:[[:space:]]*//')
            FIXES="${FIXES}* ${clean_msg} ([${short}](https://github.com/mlhiter/open-sidenotes/commit/${full}))\n"
          done < <(git log $COMMITS_RANGE --grep="^fix" -E --pretty=format:"%s|%h|%H")

          if [ -n "$FIXES" ]; then
            CHANGELOG_ENTRY="${CHANGELOG_ENTRY}### Bug Fixes\n\n${FIXES}\n"
          fi

          # Prepend to CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Remove first line "# Changelog" if exists
            tail -n +2 CHANGELOG.md > CHANGELOG.md.tmp
            echo -e "# Changelog\n\n${CHANGELOG_ENTRY}$(cat CHANGELOG.md.tmp)" > CHANGELOG.md
            rm CHANGELOG.md.tmp
          else
            echo -e "# Changelog\n\n${CHANGELOG_ENTRY}" > CHANGELOG.md
          fi

      - name: Update version files
        if: steps.check.outputs.should_release == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          # Update manifest
          echo "{\".\": \"$NEW_VERSION\"}" > .release-please-manifest.json

          # Update Xcode project
          ./scripts/update-version.sh "$NEW_VERSION"

      - name: Commit and tag
        if: steps.check.outputs.should_release == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .release-please-manifest.json CHANGELOG.md open-sidenotes.xcodeproj/project.pbxproj
          git commit -m "chore: release $NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin main --tags
